<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alarm</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    #clock {
      font-size: 72px;
      font-weight: 200;
      letter-spacing: 4px;
      font-variant-numeric: tabular-nums;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 320px;
    }

    .card h2 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #666;
    }

    input[type="time"] {
      font-size: 36px;
      font-weight: 300;
      background: transparent;
      border: none;
      border-bottom: 1px solid #333;
      color: #fff;
      padding: 8px 4px;
      text-align: center;
      width: 100%;
      cursor: pointer;
      outline: none;
      font-variant-numeric: tabular-nums;
    }

    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.4;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    #btn-set {
      background: #fff;
      color: #000;
    }

    #btn-stop {
      background: #e53e3e;
      color: #fff;
      display: none;
    }

    #status {
      font-size: 13px;
      color: #555;
      min-height: 18px;
      text-align: center;
    }

    #status.active { color: #4ade80; }
    #status.ringing { color: #f59e0b; }

    body.ringing {
      animation: flash 0.6s infinite alternate;
    }

    @keyframes flash {
      from { background: #0f0f0f; }
      to   { background: #2d1a00; }
    }
  </style>
</head>
<body>
  <div id="clock">00:00:00</div>

  <div class="card">
    <h2>Alarm</h2>
    <input type="time" id="alarm-time" />
    <div id="status">--</div>
    <button id="btn-set">Set Alarm</button>
    <button id="btn-stop">Stop</button>
  </div>

  <script>
    const clockEl   = document.getElementById('clock');
    const inputEl   = document.getElementById('alarm-time');
    const statusEl  = document.getElementById('status');
    const btnSet    = document.getElementById('btn-set');
    const btnStop   = document.getElementById('btn-stop');

    let alarmTime = null;
    let audioCtx  = null;
    let alarmNode = null;
    let isRinging = false;

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      const hh  = pad(now.getHours());
      const mm  = pad(now.getMinutes());
      const ss  = pad(now.getSeconds());
      clockEl.textContent = `${hh}:${mm}:${ss}`;

      if (alarmTime && !isRinging) {
        const current = `${hh}:${mm}`;
        if (current === alarmTime && ss === '00') {
          triggerAlarm();
        }
      }
    }

    function buildAudioContext() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playBeep() {
      if (!audioCtx) return;
      const freqs  = [880, 1100, 880, 1100];
      let offset   = audioCtx.currentTime;
      freqs.forEach(freq => {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type   = 'sine';
        osc.frequency.setValueAtTime(freq, offset);
        gain.gain.setValueAtTime(0.3, offset);
        gain.gain.exponentialRampToValueAtTime(0.001, offset + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(offset);
        osc.stop(offset + 0.35);
        offset += 0.4;
      });
    }

    function triggerAlarm() {
      isRinging = true;
      document.body.classList.add('ringing');
      statusEl.textContent = 'Ringing!';
      statusEl.className = 'ringing';
      btnStop.style.display = 'block';
      btnSet.style.display  = 'none';

      playBeep();
      alarmNode = setInterval(playBeep, 2000);
    }

    function stopAlarm() {
      isRinging = false;
      alarmTime = null;
      clearInterval(alarmNode);
      document.body.classList.remove('ringing');
      statusEl.textContent = '--';
      statusEl.className   = '';
      btnStop.style.display = 'none';
      btnSet.style.display  = 'block';
      inputEl.value = '';
    }

    btnSet.addEventListener('click', () => {
      if (!inputEl.value) return;
      buildAudioContext();
      alarmTime = inputEl.value;
      statusEl.textContent = `Set for ${alarmTime}`;
      statusEl.className   = 'active';
    });

    btnStop.addEventListener('click', stopAlarm);

    setInterval(tick, 1000);
    tick();
  </script>
</body>
</html>
